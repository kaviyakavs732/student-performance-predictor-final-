<!DOCTYPE html>
<html>
<head>
    <title>AI Student Performance Predictor</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-align: center;
            overflow-x: hidden;
        }

        h1 {
            margin-top: 20px;
            animation: fadeIn 2s ease-in-out;
        }

        .description {
            width: 70%;
            margin: auto;
            font-size: 16px;
            opacity: 0.9;
            animation: fadeIn 3s ease-in-out;
        }

        .container {
            background: rgba(255,255,255,0.95);
            color: black;
            padding: 20px;
            margin: 30px auto;
            width: 360px;
            border-radius: 15px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.3);
            animation: slideUp 1s ease;
            position: relative;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            padding: 12px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5a67d8;
            transform: scale(1.05);
        }

        #result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }

        #confidenceBar {
            width: 90%;
            height: 20px;
            background: #ddd;
            margin: 10px auto;
            border-radius: 10px;
        }

        #confidenceFill {
            height: 100%;
            width: 0%;
            background: green;
            border-radius: 10px;
        }

        /* 🎓 STUDENT IMAGE ANIMATION */
        .image {
            width: 150px;
            margin: 20px auto;
            animation: floatRotate 4s infinite ease-in-out;
        }

        @keyframes fadeIn {
            from {opacity: 0;}
            to {opacity: 1;}
        }

        @keyframes slideUp {
            from {transform: translateY(50px); opacity: 0;}
            to {transform: translateY(0); opacity: 1;}
        }

        @keyframes floatRotate {
            0% {transform: translateY(0) rotate(0deg);}
            25% {transform: translateY(-10px) rotate(10deg);}
            50% {transform: translateY(0) rotate(0deg);}
            75% {transform: translateY(-10px) rotate(-10deg);}
            100% {transform: translateY(0) rotate(0deg);}
        }
    </style>
</head>

<body>

<h1>🎓 AI Student Performance Predictor</h1>

<p class="description">
Enter your study details below to see a predicted result instantly.
</p>

<!-- ✅ STUDENT IMAGE -->
<img class="image" src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png" alt="Student Icon">

<div class="container">

    <h3>Enter Student Details</h3>

    <input type="number" id="studytime" placeholder="Study Time (1-4)">
    <input type="number" id="failures" placeholder="Failures (0-3)">
    <input type="number" id="absences" placeholder="Absences (0-30)">
    <input type="number" id="G2" placeholder="Previous Grade (0-20)">

    <button onclick="predict()">Predict</button>

    <div id="result"></div>

    <div id="confidenceBar">
        <div id="confidenceFill"></div>
    </div>
</div>

<script>
function predict() {
    let studytime = parseInt(document.getElementById("studytime").value);
    let failures = parseInt(document.getElementById("failures").value);
    let absences = parseInt(document.getElementById("absences").value);
    let G2 = parseInt(document.getElementById("G2").value);

    if (isNaN(studytime) || isNaN(failures) || isNaN(absences) || isNaN(G2)) {
        alert("Fill all fields!");
        return;
    }

    // ===== LOCAL PREDICTION LOGIC =====
    let score = studytime * 5 + (20 - failures * 4) + (20 - absences * 0.5) + G2;
    let result = score >= 50 ? "PASS" : "FAIL";
    let confidence = Math.min(Math.max(score, 50), 95); // 50-95%

    let color = result === "PASS" ? "green" : "red";

    document.getElementById("result").innerHTML =
        `Result: <span style="color:${color}">${result}</span><br>Confidence: ${Math.round(confidence)}%`;

    let bar = document.getElementById("confidenceFill");
    bar.style.width = confidence + "%";
    bar.style.background = color;
}
</script>

</body>
</html>
